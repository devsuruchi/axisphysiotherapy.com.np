<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Flyer Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; min-h-screen; font-family: 'Inter', sans-serif; }
        * { font-style: normal !important; }
    </style>
</head>
<body>

    <!-- 9:16 REEL FRAME (Perfect for Social Media) -->
    <div id="capture-area" class="relative w-[380px] h-[675px] bg-white overflow-hidden shadow-2xl border-[12px] border-white rounded-[3rem] text-center">
        
        <!-- Video Background -->
        <div class="absolute inset-0 z-0">
            <video autoplay muted loop playsinline class="w-full h-full object-cover opacity-40 grayscale-[0.2]">
                <source src="axis-interior.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-gradient-to-b from-white/90 via-white/40 to-white/95"></div>
        </div>

        <!-- Content Area -->
        <div class="relative z-10 h-full flex flex-col items-center justify-between py-12 px-6">
            
            <!-- Logo Header -->
            <div class="border-y-[3px] border-[#7e22ce] py-2 px-8 inline-block">
                <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-[#7e22ce] leading-tight">
                    Axis Physiotherapy<br>Pvt. Ltd.
                </h2>
            </div>

            <!-- Main Headline -->
            <h1 class="text-6xl font-black uppercase tracking-tighter leading-[0.82] text-[#581c87]">
                You're <br> Invited
            </h1>

            <!-- Date Box -->
            <div class="bg-[#7e22ce] text-white p-4 rounded-2xl shadow-xl w-full max-w-[280px]">
                <p class="text-sm font-black uppercase tracking-widest leading-none mb-1">
                    01 to 30 Baishakh 2083
                </p>
                <div class="h-[1px] bg-white/20 my-2 w-full"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-90">
                    14 April — 14 May 2026
                </p>
            </div>

            <!-- Offers -->
            <div class="w-full border-t border-[#7e22ce]/20 pt-6">
                <p class="text-2xl font-black text-[#9333ea] uppercase tracking-tighter">15% OFF Physio</p>
                <p class="text-xl font-black text-[#6b21a8] uppercase tracking-tighter opacity-80">10% OFF Massage</p>
                <p class="text-[10px] font-black text-[#7e22ce] uppercase tracking-[0.4em] mt-4">
                    Celebrating 5 Years
                </p>
            </div>

            <!-- Footer -->
            <div class="w-full pt-4 border-t-[3px] border-[#7e22ce]">
                <p class="text-[10px] font-black uppercase tracking-widest text-[#581c87] leading-relaxed">
                    Pulchowk, Lalitpur • Opp. Everest Bank <br>
                    <span class="text-[#16a34a] font-black animate-pulse">● Book Now via WhatsApp</span>
                </p>
            </div>
        </div>
    </div>

    <!-- ACTION BUTTONS (Hidden during capture) -->
    <div class="fixed bottom-4 flex gap-4">
        <button onclick="downloadImage()" class="bg-purple-600 text-white px-6 py-3 rounded-full font-black uppercase text-xs">Download as JPEG</button>
        <p class="text-white/40 text-[10px] uppercase mt-4">For Video: Screen record this screen</p>
    </div>

    <script>
        function downloadImage() {
            const btn = event.target;
            btn.innerText = "Generating...";
            html2canvas(document.querySelector("#capture-area"), {
                scale: 3, // High quality
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Axis-Anniversary-Flyer.jpg';
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                btn.innerText = "Download as JPEG";
            });
        }
    </script>
</body>
</html>
