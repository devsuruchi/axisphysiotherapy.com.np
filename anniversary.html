<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Video Flyer Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: screen; font-family: 'Inter', sans-serif; }
        * { font-style: normal !important; }
        /* Hidden from video recording */
        #controls { margin-top: 20px; z-index: 100; }
    </style>
</head>
<body>

    <!-- THE FLYER AREA (This is what will be recorded) -->
    <div id="flyer-capture" class="relative w-[360px] h-[640px] bg-white overflow-hidden shadow-2xl border-[10px] border-white rounded-[3rem] text-center">
        
        <!-- Video Background -->
        <div class="absolute inset-0 z-0">
            <video id="bgVideo" autoplay muted loop playsinline class="w-full h-full object-cover opacity-50">
                <source src="axis-interior.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-gradient-to-b from-white/90 via-white/30 to-white/95"></div>
        </div>

        <!-- Content Area -->
        <div class="relative z-10 h-full flex flex-col items-center justify-between py-12 px-6">
            <!-- Logo -->
            <div class="border-y-[3px] border-[#7e22ce] py-1 px-8">
                <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-[#7e22ce] leading-tight">
                    Axis Physiotherapy
                </h2>
            </div>

            <!-- Message -->
            <h1 class="text-6xl font-black uppercase tracking-tighter leading-[0.82] text-[#581c87]">
                You're <br> Invited
            </h1>

            <!-- Dates -->
            <div style="background: #7e22ce; color: white; padding: 1rem 1.5rem; border-radius: 1.25rem; width: 100%; max-width: 260px; box-shadow: 0 15px 30px rgba(126, 34, 206, 0.3);">
                <p class="text-sm font-black uppercase tracking-widest leading-none mb-2">01 to 30 Baishakh 2083</p>
                <div class="h-[1px] bg-white/20 mb-2"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-90">14 April — 14 May 2026</p>
            </div>

            <!-- Offers -->
            <div class="w-full border-t border-[#7e22ce]/20 pt-4">
                <p class="text-2xl font-black text-[#9333ea] uppercase tracking-tighter">15% OFF Physio</p>
                <p class="text-xl font-black text-[#6b21a8] uppercase tracking-tighter">10% OFF Massage</p>
                <p class="text-[9px] font-black text-[#7e22ce] uppercase tracking-[0.5em] mt-4">Celebrating 5 Years</p>
            </div>

            <!-- Footer -->
            <div class="w-full pt-4 border-t-[3px] border-[#7e22ce]">
                <p class="text-[9px] font-black uppercase tracking-widest text-[#581c87]">
                    Pulchowk, Lalitpur • Opp. Everest Bank
                </p>
            </div>
        </div>
    </div>

    <!-- UI CONTROLS -->
    <div id="controls">
        <button id="recordBtn" onclick="startCapture()" class="bg-purple-600 text-white px-8 py-4 rounded-full font-black uppercase tracking-widest text-xs shadow-2xl hover:bg-purple-700 transition-all">
            Start Recording (10 Seconds)
        </button>
        <p id="status" class="text-white/40 text-[10px] uppercase mt-4 text-center">Video will download automatically after 10s</p>
    </div>

    <!-- html2canvas or mediaRecorder script -->
    <script>
        async function startCapture() {
            const btn = document.getElementById('recordBtn');
            const status = document.getElementById('status');
            const flyer = document.getElementById('flyer-capture');
            
            btn.innerText = "Recording...";
            btn.disabled = true;

            // Capture the stream from the computer screen/window
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: 30 }
                });

                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9'
                });

                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Axis-Anniversary-Flyer.mp4';
                    a.click();
                    
                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                    
                    btn.innerText = "Start Recording (10 Seconds)";
                    btn.disabled = false;
                };

                mediaRecorder.start();
                
                // Automatically stop after 10 seconds
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 10000);

            } catch (err) {
                console.error("Error: " + err);
                alert("Please allow screen capture to record the video.");
                btn.innerText = "Start Recording (10 Seconds)";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
