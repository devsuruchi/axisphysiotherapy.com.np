<script>
    /**
     * MASTER REVEAL LOGIC
     * Ensures the whole unit is perfectly ready before showing
     */
    function revealAnniversaryFlyer() {
        const popup = document.getElementById('anniversary-popup');
        const flyer = document.getElementById('flyer-card');
        const bgImg = document.getElementById('flyer-bg-img');

        // Create an Image object to monitor download
        const imgPreloader = new Image();
        imgPreloader.src = bgImg.src;

        const showNow = () => {
            popup.style.display = 'flex';
            // Wait 100ms for display:flex to settle
            setTimeout(() => {
                flyer.style.opacity = '1';
                flyer.style.transform = 'translateY(0)';
            }, 100);
        };

        imgPreloader.onload = () => {
            // Wait 1.5 seconds for the user to see the site, then reveal the flyer as ONE piece
            setTimeout(showNow, 1500);
        };

        // If the image fails to load, show the flyer anyway so we don't lose the sale
        imgPreloader.onerror = () => {
            setTimeout(showNow, 1500);
        };
    }

    function closeAnniversary() {
        const flyer = document.getElementById('flyer-card');
        const popup = document.getElementById('anniversary-popup');
        
        flyer.style.opacity = '0';
        flyer.style.transform = 'translateY(20px)';
        
        setTimeout(() => {
            popup.style.display = 'none';
        }, 800);
    }

    // Initialize only if the user hasn't seen it in this session (Optional)
    // For now, it will run every refresh
    revealAnniversaryFlyer();
</script>
