<script>
    // Bulletproof trigger: Waits 2 seconds after page load then shows popup
    window.addEventListener('load', function() {
        setTimeout(() => {
            const popup = document.getElementById('anniversary-popup');
            const flyer = document.getElementById('flyer-card');
            
            if(popup && flyer) {
                popup.style.display = 'flex';
                // Small delay to trigger the CSS transition
                setTimeout(() => {
                    flyer.style.opacity = '1';
                    flyer.style.transform = 'translateY(0)';
                }, 100);
            }
        }, 2000); // 2 second delay
    });

    function closeAnniversary() {
        const flyer = document.getElementById('flyer-card');
        const popup = document.getElementById('anniversary-popup');
        if(flyer) flyer.style.opacity = '0';
        if(flyer) flyer.style.transform = 'translateY(20px)';
        setTimeout(() => { 
            if(popup) popup.style.display = 'none'; 
        }, 600);
    }
</script>

<style>
    #anniversary-popup * { font-style: normal !important; }
    #flyer-card::-webkit-scrollbar { display: none; }
