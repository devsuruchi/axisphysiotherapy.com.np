<style>
    /* Professional Animations */
    @keyframes popupOpen {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-popup { animation: popupOpen 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    #anniversary-popup * { font-style: normal !important; }
</style>

<script>
    // Show popup after 2 seconds
    setTimeout(() => {
        const popup = document.getElementById('anniversary-popup');
        popup.style.display = 'flex';
        // Re-run Lucide if it's available to show the 'X' icon
        if (window.lucide) { lucide.createIcons(); }
    }, 2000);

    // Close function
    function closeAnniversary() {
        document.getElementById('anniversary-popup').style.display = 'none';
    }
</script>
