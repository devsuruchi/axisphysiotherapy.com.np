<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis 5th Anniversary Video Flyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; background: #000; }
        * { font-style: normal !important; text-transform: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">

    <!-- THE VIDEO BACKGROUND -->
    <div class="absolute inset-0 z-0">
        <video autoplay muted loop playsinline class="w-full h-full object-cover brightness-[0.7]">
            <source src="axis-exercises.mp4" type="video/mp4">
        </video>
        <!-- Overlay for readability -->
        <div class="absolute inset-0 bg-white/60"></div>
    </div>

    <!-- THE FLYER CONTENT -->
    <div class="relative z-10 w-[90%] max-w-[500px] aspect-[9/16] bg-white/90 backdrop-blur-md border-[12px] border-white shadow-2xl flex flex-col items-center justify-center p-10 text-center rounded-[3rem]">
        
        <!-- Top Logo Bar -->
        <div class="border-y-[3px] border-slate-950 py-2 px-8 mb-12">
            <h2 class="text-base font-black uppercase tracking-[0.4em] text-slate-950">
                The Axis <br> Physiotherapy
            </h2>
        </div>

        <!-- Main Message -->
        <h1 class="text-7xl md:text-8xl font-black uppercase tracking-tighter leading-[0.85] text-slate-950 mb-10">
            You're <br> Invited
        </h1>

        <!-- Location Box -->
        <div class="bg-slate-950/5 border border-slate-950/10 px-8 py-3 rounded-xl mb-6">
            <span class="text-sm font-black uppercase tracking-[0.3em] text-slate-600">
                Pulchowk Outlet
            </span>
        </div>

        <!-- Date Box -->
        <div class="bg-slate-950 text-white px-10 py-6 rounded-3xl mb-10 shadow-2xl">
            <h3 class="text-3xl md:text-4xl font-black uppercase tracking-widest leading-none">
                Baisakh 01-10
            </h3>
        </div>

        <!-- The Offer -->
        <div class="w-full border-t border-slate-950/10 pt-8 space-y-2">
            <p class="text-2xl font-black text-purple-700 uppercase tracking-tight">
                15% Off Physio
            </p>
            <p class="text-xl font-black text-slate-800 uppercase tracking-tight">
                10% Off Massage
            </p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] mt-6">
                Celebrating 5 Years
            </p>
        </div>

        <!-- Footer Address -->
        <div class="absolute bottom-10 w-[80%] pt-6 border-t-[3px] border-slate-950">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-950 leading-relaxed">
                Pulchowk, Lalitpur • Opp. NIMB Bank
            </p>
        </div>
    </div>

</body>
</html>
