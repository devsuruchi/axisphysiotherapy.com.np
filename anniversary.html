        <!-- FLYER CONTENT AREA -->

            <div class="border-y-[3px] border-slate-950 py-2 px-8 mb-10 inline-block">

            </a>
        </div>
    </div>
</div>

<script>
    /**
     * PRELOADER LOGIC
     * This waits for the image to be fully ready before showing the popup
     */
    function initAnniversaryPopup() {
        const popup = document.getElementById('anniversary-popup');
        const bgImg = document.getElementById('popup-bg-img');

        // Create a temporary image to check loading status
        const imgLoader = new Image();
        imgLoader.src = bgImg.src;

        imgLoader.onload = function() {
            // Only show the popup after 2 seconds AND after image is loaded
            setTimeout(() => {
                popup.style.display = 'flex';
                // Trigger the fade-in
                setTimeout(() => {
                    popup.style.opacity = '1';
                }, 50);
                
                if (window.lucide) { lucide.createIcons(); }
            }, 1500);
        };

        // Fallback: If image fails to load, show the popup anyway after 3 seconds
        imgLoader.onerror = function() {
            setTimeout(() => {
                popup.style.display = 'flex';
                popup.style.opacity = '1';
                if (window.lucide) { lucide.createIcons(); }
            }, 2000);
        };
    }

    function closeAnniversary() {
        const popup = document.getElementById('anniversary-popup');
        popup.style.opacity = '0';
        setTimeout(() => {
            popup.style.display = 'none';
        }, 800);
    }

    // Run the preloader
    initAnniversaryPopup();
</script>

<style>
    /* Ensure Brand Standards */
    #anniversary-popup * { font-style: normal !important; }
</style>
