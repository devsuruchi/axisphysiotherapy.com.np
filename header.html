<!-- HEADER MODULE: FIXED TRANSPARENCY & MODULAR LOGIC -->
<div x-data="{ mobileMenu: false }" class="relative w-full">
    
    <!-- 1. TOP INFO BAR -->
    <div class="hidden lg:block bg-purple-950 text-purple-200 py-2.5 text-[10px] uppercase tracking-[0.2em] border-b border-white/5 relative z-[110]">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center font-black">
            <div class="flex gap-8">
                <a href="mailto:info@axisphysiotherapy.com.np" class="flex items-center gap-2 hover:text-white transition-colors lowercase tracking-normal">
                    <i data-lucide="mail" size="14" class="text-purple-400"></i> info@axisphysiotherapy.com.np
                </a>
                <a href="tel:+97715907651" class="flex items-center gap-2 hover:text-white transition-colors font-bold">
                    <i data-lucide="phone" size="14" class="text-purple-400"></i> 01-5907651
                </a>
            </div>
            <div class="flex gap-6 items-center">
                <span class="opacity-100 font-bold flex items-center gap-2 tracking-normal uppercase text-[9px] whitespace-nowrap">
                    <i data-lucide="clock" size="12" class="text-purple-400"></i> Sun — Fri: 8:00 AM - 7:00 PM
                </span>
                <span class="text-purple-800">|</span>
                <a href="#partnerships" class="text-purple-300 hover:text-white transition-colors underline decoration-purple-800 underline-offset-4 font-bold text-[9px] uppercase">Hospital Partners</a>
            </div>
        </div>
    </div>

    <!-- 2. NAVIGATION BAR (The Sticky Header) -->
    <nav class="sticky top-0 w-full z-[100] glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            
            <!-- Logo Branding -->
            <a href="index.html" class="flex items-center gap-3 group transition-transform active:scale-95">
                <img src="logo.png" alt="Axis Logo" class="h-10 md:h-12 w-auto object-contain">
                <div class="flex flex-col border-l-2 border-purple-100 pl-3 text-left">
                    <span class="font-black text-xl tracking-tighter text-purple-900 leading-none uppercase group-hover:text-purple-600 transition-colors">AXIS</span>
                    <span class="text-[10px] tracking-[0.2em] font-bold text-purple-600 uppercase font-sans">Physiotherapy</span>
                </div>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center space-x-6 font-semibold text-sm text-slate-700">
                <a href="#about" class="hover:text-purple-600 transition">About</a>
                <a href="#services" class="hover:text-purple-600 transition">Services</a>
                <a href="#chiropractic-care" class="hover:text-purple-600 transition">Chiropractic</a>
                <a href="#faqs" class="hover:text-purple-600 transition">FAQs</a>
                <!-- Career Link (Sends signal to open modal) -->
                <button @click="$dispatch('open-career')" class="hover:text-purple-600 transition font-bold text-sm tracking-tight">
    Career
</button>
                <a href="#team" class="hover:text-purple-600 transition">Team</a>
                <a href="https://wellness-adobe.com" target="_blank" class="hover:text-purple-600 transition">Blogs</a>
                <a href="https://wa.me/9779863201528" class="bg-purple-600 text-white px-6 py-2.5 rounded-full hover:bg-purple-700 transition shadow-lg font-bold text-xs uppercase tracking-tighter active:scale-95">Book Appointment</a>
            </div>

            <!-- Mobile Hamburger Button -->
            <button class="lg:hidden p-2 text-purple-900 bg-purple-50 rounded-xl active:scale-90 transition-all" @click="mobileMenu = true">
                <i data-lucide="menu" class="w-7 h-7"></i>
            </button>
        </div>
    </nav>

    <!-- 3. FULL-SCREEN MOBILE OVERLAY (SOLID BACKGROUND FIX) -->
    <!-- Removed backdrop-blur and added solid #0a0a0a to fix transparency -->
   <!-- MOBILE MENU OVERLAY: COMPACT & ELEGANT (FIXED) -->
<div x-show="mobileMenu" 
     x-cloak 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-x-0"
     x-transition:leave-end="opacity-0 translate-x-full"
     class="lg:hidden fixed inset-0 z-[999] flex flex-col p-6 font-sans overflow-hidden"
     style="background-color: #0a0a0a !important;">
    
    <!-- Menu Header: Slimmer vertical padding -->
    <div class="flex justify-between items-center mb-6 pt-2 border-b border-white/10 pb-6">
        <div class="flex flex-col text-left text-white">
            <span class="font-black text-xl tracking-tighter uppercase leading-none">AXIS</span>
            <span class="text-[9px] tracking-[0.3em] font-bold text-purple-400 uppercase">Physiotherapy</span>
        </div>
        <button @click="mobileMenu = false" class="w-10 h-10 bg-white/10 rounded-full text-white flex items-center justify-center border border-white/10 active:bg-purple-600 transition-all">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Navigation Links: Optimized Font & Spacing -->
    <div class="flex flex-col space-y-0 mb-6">
        <!-- We use py-3 and text-xl for a perfect fit -->
        <a href="index.html" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter flex justify-between items-center">
            Home <i data-lucide="chevron-right" class="w-4 h-4 text-purple-600"></i>
        </a>
        <a href="#about" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">About</a>
        <a href="#services" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">Services</a>
        <a href="#chiropractic-care" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">Chiropractic</a>
        <a href="#faqs" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">FAQs</a>
        <a href="#team" @click="mobileMenu = false" class="py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">Team</a>
        <button @click="mobileMenu = false; $dispatch('open-career')" class="text-left py-3 text-xl font-black text-white border-b border-white/5 uppercase tracking-tighter">Career</button>
        <a href="https://wellness-adobe.com" target="_blank" @click="mobileMenu = false" class="py-3 text-xl font-black text-purple-400 border-b border-white/5 uppercase tracking-tighter flex justify-between items-center">
            Blogs <i data-lucide="external-link" class="w-4 h-4"></i>
        </a>
    </div>

    <!-- Bottom Action Buttons: Compact Grid -->
    <div class="mt-auto space-y-4 pb-4">
        <div class="grid grid-cols-2 gap-3">
            <a href="tel:+97715907651" class="flex flex-col items-center justify-center gap-2 bg-white/5 border border-white/10 text-white py-4 rounded-2xl active:bg-purple-600 transition-all">
                <i data-lucide="phone" class="w-5 h-5 text-purple-400"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Call Clinic</span>
            </a>
            <a href="https://wa.me/9779863201528" class="flex flex-col items-center justify-center gap-2 bg-green-600 text-white py-4 rounded-2xl shadow-xl active:bg-green-700 transition-all">
                <i data-lucide="message-circle" class="w-5 h-5 text-white"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">WhatsApp</span>
            </a>
        </div>
        <!-- Simple small footer text -->
        <p class="text-center text-[8px] text-white/20 uppercase tracking-[0.4em] font-bold">Axis Physiotherapy &copy; 2026</p>
    </div>
</div>
