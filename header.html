<div x-data="{ mobileMenu: false }" class="relative w-full">
<!-- TOP INFO BAR -->
    <div class="hidden lg:block bg-purple-950 text-purple-200 py-2.5 text-[10px] uppercase tracking-[0.3em] border-b border-white/5 relative z-[110]">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center font-black">
            <div class="flex gap-8">
                <a href="mailto:info@axisphysiotherapy.com.np" class="flex items-center gap-2 hover:text-white transition-colors lowercase tracking-normal">
                    <i data-lucide="mail" size="14"></i> info@axisphysiotherapy.com.np
                </a>
                <a href="tel:+97715907651" class="flex items-center gap-2 hover:text-white transition-colors font-bold">
                    <i data-lucide="phone" size="14"></i> 01-5907651
                </a>
            </div>
            <div class="flex gap-6 items-center">
                <span class="opacity-100 font-bold flex items-center gap-2 tracking-normal uppercase text-[9px]"><i data-lucide="clock" size="12" class="text-purple-400"></i> Sun — Fri: 8:00 AM - 7:00 PM</span>
                <span class="text-purple-800">|</span>
                <a href="#partnerships" class="text-purple-300 hover:text-white transition-colors underline decoration-purple-800 underline-offset-4">Hospital Partners</a>
            </div>
        </div>
    </div>

    <!-- NAVIGATION BAR -->
    <nav class="sticky top-0 w-full z-[100] glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-3 group transition-transform active:scale-95">
                <img src="logo.png" alt="Axis Logo" class="h-10 md:h-12 w-auto object-contain">
                <div class="flex flex-col border-l-2 border-purple-100 pl-3 text-left">
                    <span class="font-black text-xl tracking-tighter text-purple-900 leading-none uppercase">AXIS</span>
                    <span class="text-[10px] tracking-[0.2em] font-bold text-purple-600 uppercase font-sans">Physiotherapy</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center space-x-6 font-semibold text-sm text-slate-700">
                <a href="#about" class="hover:text-purple-600 transition">About</a>
                <a href="#services" class="hover:text-purple-600 transition">Services</a>
                <a href="#chiropractic-care" class="hover:text-purple-600 transition">Chiropractic</a>
                <a href="#faqs" class="hover:text-purple-600 transition">FAQs</a>
                <button @click="showCareer = true" class="hover:text-purple-600 transition font-bold text-sm uppercase tracking-tight">
    Career
</button>
                <a href="#team" class="hover:text-purple-600 transition">Team</a>
                <a href="https://wellness-adobe.com" target="_blank" class="hover:text-purple-600 transition">Blogs</a>
                <a href="https://wa.me/9779863201528" class="bg-purple-600 text-white px-6 py-2.5 rounded-full hover:bg-purple-700 transition shadow-lg font-bold text-xs uppercase tracking-tighter">Book Appointment</a>
            </div>
            <button class="lg:hidden p-2 text-purple-900" @click="mobileMenu = !mobileMenu"><i data-lucide="menu"></i></button>
        </div>

<!-- MOBILE MENU OVERLAY: FIXED SOLID BACKGROUND -->
<div x-show="mobileMenu" 
     x-cloak 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="lg:hidden fixed inset-0 z-[999] bg-slate-950 flex flex-col p-6 font-sans">
    
    <!-- Top Header inside Menu -->
    <div class="flex justify-between items-center mb-10 pt-4 border-b border-white/10 pb-6">
        <div class="flex flex-col text-left">
            <span class="font-black text-xl tracking-tighter text-white uppercase leading-none">AXIS</span>
            <span class="text-[9px] tracking-[0.3em] font-bold text-purple-400 uppercase">Physiotherapy</span>
        </div>
        <!-- Close Button -->
        <button @click="mobileMenu = false" class="w-12 h-12 bg-white/10 rounded-full text-white flex items-center justify-center border border-white/10 active:scale-90 transition-all">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Navigation Links: 100% Readable on Solid Black -->
    <div class="flex flex-col space-y-1 mb-10 overflow-y-auto">
        <a href="#" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase tracking-tighter border-b border-white/5 flex justify-between items-center">
            Home <i data-lucide="arrow-right" class="w-5 h-5 text-purple-600"></i>
        </a>
        <a href="#about" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            About
        </a>
        <a href="#services" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Services
        </a>
        <a href="#chiropractic-care" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Chiropractic
        </a>
        <a href="#faqs" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            FAQs
        </a>
        <a href="#team" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Team
        </a>
        <button @click="mobileMenu = false; showCareer = true" class="text-left py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Career
        </button>
    </div>

    <!-- Action Buttons at Bottom -->
    <div class="mt-auto space-y-4 pb-8">
        <div class="grid grid-cols-2 gap-3">
            <a href="tel:+97715907651" class="flex flex-col items-center justify-center gap-2 bg-white/5 border border-white/10 text-white py-6 rounded-[2rem] active:bg-white/20 transition-all">
                <i data-lucide="phone" class="text-purple-400"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Call</span>
            </a>
            <a href="https://wa.me/9779863201528" class="flex flex-col items-center justify-center gap-2 bg-green-600 text-white py-6 rounded-[2rem] shadow-lg active:bg-green-700 transition-all">
                <i data-lucide="message-circle"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">WhatsApp</span>
            </a>
        </div>
    </div>
</div>
