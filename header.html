<!-- MOBILE MENU OVERLAY: FIXED SOLID BACKGROUND -->
<div x-show="mobileMenu" 
     x-cloak 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="lg:hidden fixed inset-0 z-[999] bg-slate-950 flex flex-col p-6 font-sans">
    
    <!-- Top Header inside Menu -->
    <div class="flex justify-between items-center mb-10 pt-4 border-b border-white/10 pb-6">
        <div class="flex flex-col text-left">
            <span class="font-black text-xl tracking-tighter text-white uppercase leading-none">AXIS</span>
            <span class="text-[9px] tracking-[0.3em] font-bold text-purple-400 uppercase">Physiotherapy</span>
        </div>
        <!-- Close Button -->
        <button @click="mobileMenu = false" class="w-12 h-12 bg-white/10 rounded-full text-white flex items-center justify-center border border-white/10 active:scale-90 transition-all">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Navigation Links: 100% Readable on Solid Black -->
    <div class="flex flex-col space-y-1 mb-10 overflow-y-auto">
        <a href="#" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase tracking-tighter border-b border-white/5 flex justify-between items-center">
            Home <i data-lucide="arrow-right" class="w-5 h-5 text-purple-600"></i>
        </a>
        <a href="#about" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            About
        </a>
        <a href="#services" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Services
        </a>
        <a href="#chiropractic-care" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Chiropractic
        </a>
        <a href="#faqs" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            FAQs
        </a>
        <a href="#team" @click="mobileMenu = false" class="py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Team
        </a>
        <button @click="mobileMenu = false; showCareer = true" class="text-left py-5 text-3xl font-black text-white uppercase border-b border-white/5">
            Career
        </button>
    </div>

    <!-- Action Buttons at Bottom -->
    <div class="mt-auto space-y-4 pb-8">
        <div class="grid grid-cols-2 gap-3">
            <a href="tel:+97715907651" class="flex flex-col items-center justify-center gap-2 bg-white/5 border border-white/10 text-white py-6 rounded-[2rem] active:bg-white/20 transition-all">
                <i data-lucide="phone" class="text-purple-400"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Call</span>
            </a>
            <a href="https://wa.me/9779863201528" class="flex flex-col items-center justify-center gap-2 bg-green-600 text-white py-6 rounded-[2rem] shadow-lg active:bg-green-700 transition-all">
                <i data-lucide="message-circle"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">WhatsApp</span>
            </a>
        </div>
    </div>
</div>
