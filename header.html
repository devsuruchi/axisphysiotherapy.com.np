<!-- HEADER COMPONENT -->
<div x-data="{ mobileMenu: false }" class="relative w-full">
    
    <!-- NAVIGATION BAR -->
    <nav class="sticky top-0 w-full z-[100] glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3 group transition-transform active:scale-95">
                <img src="logo.png" alt="Axis Logo" class="h-10 md:h-12 w-auto object-contain">
                <div class="flex flex-col border-l-2 border-purple-100 pl-3 text-left">
                    <span class="font-black text-xl tracking-tighter text-purple-900 leading-none uppercase">AXIS</span>
                    <span class="text-[10px] tracking-[0.2em] font-bold text-purple-600 uppercase font-sans">Physiotherapy</span>
                </div>
            </a>

            <!-- Desktop Menu (Hidden on Mobile) -->
            <div class="hidden lg:flex items-center space-x-6 font-semibold text-sm text-slate-700">
                <a href="index.html#about" class="hover:text-purple-600 transition">About</a>
                <a href="index.html#services" class="hover:text-purple-600 transition">Services</a>
                <a href="index.html#faqs" class="hover:text-purple-600 transition">FAQs</a>
                <button @click="showCareer = true" class="hover:text-purple-600 transition font-bold">Career</button>
                <a href="https://wa.me/9779863201528" class="bg-purple-600 text-white px-6 py-2.5 rounded-full hover:bg-purple-700 transition shadow-lg font-bold text-xs uppercase tracking-tighter">Book Appointment</a>
            </div>

            <!-- HAMBURGER BUTTON (Visible on Mobile) -->
            <button class="lg:hidden p-3 text-purple-900 bg-purple-50 rounded-xl active:scale-90 transition-all z-[110]" 
                    @click="mobileMenu = true">
                <i data-lucide="menu" class="w-7 h-7"></i>
            </button>
        </div>

        <!-- MOBILE MENU OVERLAY (The "Total Black" Fix) -->
        <div x-show="mobileMenu" 
             x-cloak 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-full"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-full"
             class="fixed inset-0 z-[200] bg-[#0a0a0a] flex flex-col p-6 font-sans">
            
            <!-- Menu Top Header -->
            <div class="flex justify-between items-center mb-10 pt-4 border-b border-white/10 pb-8">
                <div class="flex flex-col text-left">
                    <span class="font-black text-2xl tracking-tighter text-white uppercase leading-none">AXIS</span>
                    <span class="text-[10px] tracking-[0.3em] font-bold text-purple-400 uppercase">Physiotherapy</span>
                </div>
                <!-- Close Button -->
                <button @click="mobileMenu = false" class="w-14 h-14 bg-white/10 rounded-full text-white flex items-center justify-center active:bg-purple-600 transition-all">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>

            <!-- Navigation Links -->
            <div class="flex flex-col space-y-2 mb-10">
                <a href="index.html" @click="mobileMenu = false" class="py-5 text-4xl font-black text-white uppercase tracking-tighter border-b border-white/5">Home</a>
                <a href="index.html#about" @click="mobileMenu = false" class="py-5 text-4xl font-black text-white uppercase border-b border-white/5">About</a>
                <a href="index.html#services" @click="mobileMenu = false" class="py-5 text-4xl font-black text-white uppercase border-b border-white/5">Services</a>
                <button @click="mobileMenu = false; showCareer = true" class="text-left py-5 text-4xl font-black text-white uppercase border-b border-white/5">Career</button>
            </div>

            <!-- Bottom Contact Grid -->
            <div class="mt-auto space-y-4 pb-10">
                <div class="grid grid-cols-2 gap-4">
                    <a href="tel:+97715907651" class="flex flex-col items-center justify-center gap-3 bg-white/5 border border-white/10 text-white py-8 rounded-[2.5rem] active:bg-purple-600 transition-all">
                        <i data-lucide="phone" class="w-6 h-6 text-purple-400"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Call Clinic</span>
                    </a>
                    <a href="https://wa.me/9779863201528" class="flex flex-col items-center justify-center gap-3 bg-green-600 text-white py-8 rounded-[2.5rem] shadow-xl active:bg-green-700 transition-all">
                        <i data-lucide="message-circle" class="w-6 h-6"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">WhatsApp</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
</div>
