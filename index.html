<script>
    /**
     * ZERO-FLICKER PRELOADER
     */
    function initAnniversaryPopup() {
        const popup = document.getElementById('anniversary-popup');
        const flyer = document.getElementById('flyer-card');
        const bgImg = document.getElementById('flyer-bg-img');

        const imgPreloader = new Image();
        imgPreloader.src = bgImg.src;

        const reveal = () => {
            setTimeout(() => {
                popup.style.display = 'flex';
                setTimeout(() => {
                    flyer.style.opacity = '1';
                    flyer.style.transform = 'translateY(0)';
                }, 100);
            }, 1500); // 1.5 second delay before appearing
        };

        imgPreloader.onload = reveal;
        imgPreloader.onerror = reveal; 
    }

    function closeAnniversary() {
        const flyer = document.getElementById('flyer-card');
        const popup = document.getElementById('anniversary-popup');
        flyer.style.opacity = '0';
        flyer.style.transform = 'translateY(20px)';
        setTimeout(() => { popup.style.display = 'none'; }, 800);
    }

    initAnniversaryPopup();
</script>
